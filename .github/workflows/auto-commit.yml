name: Daily Commit

on:
  schedule:
    - cron: '0 18 * * *'   # runs daily at 11:30 PM IST
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Make changes
        run: |
          echo "Last updated: $(date)" >> streak.txt

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "auto: daily commit" || echo "No changes"
          git push
