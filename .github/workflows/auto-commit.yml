name: Daily Commit

permissions:
  contents: write

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Make changes
        run: echo "Last updated: $(date)" >> streak.txt

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "auto: daily commit" || echo "No changes"
          git push
